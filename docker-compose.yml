services:
  postgres:
    image: postgres:16-alpine
    container_name: novel-studio-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: novel_studio
      POSTGRES_PASSWORD: novel_studio_dev
      POSTGRES_DB: novel_studio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_studio -d novel_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: novel-studio-api
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://novel_studio:novel_studio_dev@postgres:5432/novel_studio
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: novel-studio-web
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  pgdata:
